
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers</title>
<link rel="stylesheet" href="style.css">
<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
}
header{
background:#0d6efd;
color:white;
padding:15px;
text-align:center;
}
.container{
padding:20px;
}
table{
width:100%;
border-collapse:collapse;
background:white;
}
th,td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}
th{
background:#0d6efd;
color:white;
}
button{
padding:10px 18px;
background:#0d6efd;
color:white;
border:none;
border-radius:6px;
margin-bottom:15px;
}
</style>
</head>
<body>

<header>
<h2>Customer Management</h2>
</header>

<div class="container">

<button>Add Customer</button>

<table>
<tr>
<th>Name</th>
<th>Phone</th>
<th>City</th>
<th>Balance</th>
</tr>

<tr>
<td>Demo Customer</td>
<td>9876543210</td>
<td>Srinagar</td>
<td>₹0.00</td>
</tr>

</table>

</div>

</body>
</html>
