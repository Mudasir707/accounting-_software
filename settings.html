<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f6f9;
}

header{
background:#343a40;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
}

button{
margin-top:20px;
padding:12px 20px;
background:#0d6efd;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<h2>Settings</h2>
</header>

<div class="container">

<div class="card">

<h3>Company Information</h3>

<label>Company Name</label>
<input type="text" value="Sheen Agri Fresh Pvt. Ltd.">

<label>GST Number</label>
<input type="text">

<label>Phone Number</label>
<input type="text">

<label>Email</label>
<input type="email">

<label>Address</label>
<input type="text">

<button>Save Settings</button>

</div>

</div>

</body>
</html>
