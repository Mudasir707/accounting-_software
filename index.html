<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sheen Accounting Login</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>🏢 Sheen Accounting</h1>
        <p>Sign in to continue</p>

        <input
            type="email"
            id="email"
            placeholder="Email Address"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button id="loginBtn">
            Login
        </button>

        <p class="footer">
            Powered by Sheen Agri Fresh Pvt. Ltd.
        </p>

    </div>

</div>

<script type="module" src="js/login.js"></script>

</body>
</html>
