<!DOCTYPE html>

<head>

  <title>Sheen Accounting Software</title>

  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

<header class="topbar">
  <h1>🏢 Sheen Accounting</h1>

  <div class="card">

    <div class="amount" id="salesTotal">₹0</div>
  </div>

  <div class="card">

    <div class="amount" id="stockTotal">0</div>
  </div>

  <div class="card">
    <h2>🚚 Suppliers</h2>
    <div class="amount" id="supplierTotal">0</div>
  </div>

  <h2 class="section-title">Quick Menu</h2>

  <div class="menu-grid">

    <a href="customers.html" class="menu-btn">
      👥
      <span>Customers</span>
    </a>

    <a href="sales.html" class="menu-btn">
      🧾
      <span>Sales</span>
    </a>

    <a href="purchase.html" class="menu-btn">
      🛒
      <span>Purchase</span>
    </a>

    <a href="inventory.html" class="menu-btn">
      📦
      <span>Inventory</span>
    </a>

    <a href="suppliers.html" class="menu-btn">
      🚚
      <span>Suppliers</span>
    </a>

    <a href="payroll.html" class="menu-btn">
      💰
      <span>Payroll</span>
    </a>

    <a href="reports.html" class="menu-btn">
      📊
      <span>Reports</span>
    </a>

    <a href="settings.html" class="menu-btn">
      ⚙️
      <span>Settings</span>
    </a>

    <a href="index.html" class="menu-btn logout">
      🚪
      <span>Logout</span>
    </a>

  </div>

</main>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
