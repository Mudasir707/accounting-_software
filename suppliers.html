<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suppliers</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f6f9;
}

header{
background:#fd7e14;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#fd7e14;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#fd7e14;
color:white;
}
</style>

</head>

<body>

<header>
<h2>Supplier Management</h2>
</header>

<div class="container">

<div class="card">

<h3>Add Supplier</h3>

<input type="text" placeholder="Supplier Name">

<input type="text" placeholder="Phone Number">

<input type="text" placeholder="GST Number">

<input type="text" placeholder="Address">

<button>Save Supplier</button>

<table>

<tr>
<th>Name</th>
<th>Phone</th>
<th>GST No.</th>
<th>Balance</th>
</tr>

<tr>
<td>Demo Supplier</td>
<td>9876543210</td>
<td>01ABCDE1234F1Z5</td>
<td>₹0.00</td>
</tr>

</table>

</div>

</div>

</body>
</html>
