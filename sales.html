<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Invoice</title>
<link rel="stylesheet" href="style.css">
<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
}
header{
background:#0d6efd;
color:#fff;
padding:15px;
text-align:center;
}
.container{
max-width:900px;
margin:20px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}
button{
background:#0d6efd;
color:#fff;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>
<body>

<header>
<h2>Sales Invoice</h2>
</header>

<div class="container">

<label>Invoice No.</label>
<input type="text" placeholder="INV-0001">

<label>Customer Name</label>
<input type="text" placeholder="Customer">

<label>Product</label>
<input type="text" placeholder="Product Name">

<label>Quantity</label>
<input type="number">

<label>Rate</label>
<input type="number">

<label>Total</label>
<input type="number" readonly>

<button>Create Invoice</button>

</div>

</body>
</html>
